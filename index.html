<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>📜 키워드 대화 위젯 생성기/title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f1f5f9;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    padding: 2rem 1rem;
    color: #0f172a;
  }
  .container {
    max-width: 1600px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    align-items: start;
  }
  @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
  
  .form-panel {
    background: white;
    border-radius: 2rem;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    padding: 1.2rem;
    border: 1px solid #e2e8f0;
    max-height: 90vh;
    overflow-y: auto;
  }
  .form-group { margin-bottom: 1rem; }
  label { font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 0.2rem; color: #1e293b; }
  input, textarea, select {
    width: 100%;
    padding: 0.5rem 0.7rem;
    border: 1px solid #cbd5e1;
    border-radius: 1rem;
    font-size: 0.85rem;
    background: #fefcf5;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    margin: 1rem 0 0.6rem 0;
    border-left: 3px solid #3b82f6;
    padding-left: 0.7rem;
  }
  button {
    background: #0f172a;
    color: white;
    border: none;
    padding: 0.4rem 1rem;
    border-radius: 2rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    margin-right: 0.5rem;
    margin-top: 0.3rem;
    font-size: 0.8rem;
  }
  button:hover { opacity: 0.85; transform: scale(0.97); }
  .cat-item, .kw-item {
    background: #f8fafc;
    border-radius: 1rem;
    padding: 0.8rem;
    margin-bottom: 0.8rem;
    border: 1px solid #e2e8f0;
  }
  .cat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .cat-header strong { font-size: 1rem; }
  .toggle-icon { font-size: 1.2rem; transition: transform 0.2s; }
  .cat-content { margin-top: 0.8rem; }
  .cat-content.collapsed { display: none; }
  
  .collapsible-section {
    margin-bottom: 1rem;
    border: 1px solid #e2e8f0;
    border-radius: 1rem;
    background: #fefcf5;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 1rem;
    background: #f1f5f9;
    cursor: pointer;
    font-weight: 700;
  }
  .section-header .toggle-icon { font-size: 1rem; }
  .section-content { padding: 0.8rem; }
  .section-content.collapsed { display: none; }
  
  .result-panel {
    background: #0f172a;
    border-radius: 2rem;
    padding: 1rem;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }
  pre {
    background: #1e293b;
    padding: 0.8rem;
    border-radius: 1rem;
    overflow-x: auto;
    font-size: 0.7rem;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 40vh;
  }
  .preview-container {
    background: #0b0c0e;
    border-radius: 1.2rem;
    padding: 0.6rem;
    border: 1px solid #334155;
  }
  .preview-label {
    font-size: 0.7rem;
    margin-bottom: 0.4rem;
    color: #94a3b8;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  iframe {
    width: 100%;
    background: #f8fafc;
    border-radius: 0.8rem;
    border: none;
    display: block;
    min-height: 500px;
  }
  .copy-btn, .download-btn { background: #3b82f6; border: none; padding: 0.3rem 0.8rem; border-radius: 2rem; font-size: 0.7rem; }
  hr { margin: 0.8rem 0; border-color: #334155; }
  small { font-size: 0.7rem; color: #94a3b8; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .badge { background: #e2e8f0; padding: 0.2rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; color: #1e293b; }
  .color-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }
  .color-item {
    background: #f8fafc;
    padding: 0.4rem;
    border-radius: 1rem;
  }
  .color-item label { font-size: 0.7rem; margin-bottom: 0.1rem; }
  .color-item input { padding: 0.2rem; height: 2rem; width: 100%; }
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .checkbox-group label { margin-bottom: 0; font-size: 0.85rem; }
  .file-upload-area {
    background: #f1f5f9;
    border: 1px dashed #cbd5e1;
    border-radius: 1rem;
    padding: 0.5rem;
    text-align: center;
    margin-bottom: 1rem;
  }
  .paste-area {
    background: #f8fafc;
    border-radius: 1rem;
    padding: 0.6rem;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>
<div class="container">
  <!-- 좌측 패널 -->
  <div class="form-panel">
    <h2>📜 키워드 대화 위젯 생성기</h2>
    <p style="margin-bottom:1rem; font-size:0.8rem;">HTML/JSON/코드 붙여넣기로 불러오기 → 편집 → 새 HTML 생성</p>

    <!-- 불러오기 영역 -->
    <div class="paste-area">
      <label>📋 HTML 코드 붙여넣기</label>
      <textarea id="pasteHtmlCode" rows="4" placeholder="<!DOCTYPE html> ... 위젯 HTML 코드를 여기에 붙여넣으세요."></textarea>
      <button id="loadFromPasteBtn" style="background:#4b5563; margin-top:0.3rem;">🔄 붙여넣기로 불러오기</button>
      <div id="pasteLoadStatus" style="font-size:0.7rem; margin-top:0.3rem; color:#5b6e8c;"></div>
    </div>

    <div class="file-upload-area">
      <label>📂 위젯 HTML 파일 불러오기</label>
      <input type="file" id="htmlFileInput" accept=".html">
      <button id="loadHtmlBtn" style="background:#4b5563; margin-left:0.5rem;">불러오기</button>
      <span style="margin-left:0.5rem;">|</span>
      <label style="display:inline; margin-left:0.5rem;">📂 JSON 파일</label>
      <input type="file" id="jsonFileInput" accept=".json" style="width:auto; display:inline-block;">
      <button id="loadSampleBtn" style="background:#4b5563; margin-left:0.5rem;">기본 예제</button>
    </div>

    <!-- 캐릭터 정보 -->
    <div class="collapsible-section">
      <div class="section-header" data-target="char-info">
        <span>👤 캐릭터 기본 정보</span>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="section-content" id="char-info">
        <div class="form-group"><label>캐릭터 이름</label><input type="text" id="charName" value="캐릭터 이름"></div>
        <div class="form-group"><label>기본 초상화 URL</label><input type="text" id="portraitDefault" placeholder="https://..."></div>
        <div class="form-group"><label>표정별 이미지 URL (JSON)</label><textarea id="portraitMap" rows="3" placeholder='{"기본":"https://...","웃음":"https://...","정색":"https://...","곤란":"https://..."}' style="font-family:monospace;">{"기본":"","웃음":"","정색":"","곤란":""}</textarea></div>
        <div class="checkbox-group"><input type="checkbox" id="hidePortrait"><label>✨ 초상화 표시하지 않기</label></div>
      </div>
    </div>

    <!-- 대화 메시지 -->
    <div class="collapsible-section">
      <div class="section-header" data-target="message-settings">
        <span>💬 대화 메시지 커스텀</span>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="section-content" id="message-settings">
        <div class="form-group"><label>기본 대사</label><input type="text" id="defaultText" value="키워드를 선택하면 대화가 표시됩니다."></div>
        <div class="form-group"><label>대화 종료 메시지</label><input type="text" id="endMessage" value="대화를 끝냈습니다."></div>
        <div class="form-group"><label>키워드 미선택 시 메시지</label><input type="text" id="noKeywordMessage" value="키워드를 먼저 선택해주세요."></div>
      </div>
    </div>

    <!-- 웹폰트 -->
    <div class="collapsible-section">
      <div class="section-header" data-target="font-settings">
        <span>🔤 웹폰트 (위젯 내부)</span>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="section-content" id="font-settings">
        <div class="form-group"><label>웹폰트 CSS (@font-face)</label><textarea id="webFontCode" rows="4" placeholder="@font-face { font-family: 'Mabiyet'; src: url('...'); }"></textarea></div>
        <div class="form-group"><label>적용할 font-family 이름</label><input type="text" id="fontFamilyName" placeholder="Mabiyet, sans-serif"></div>
      </div>
    </div>

    <!-- 색상 테마 -->
    <div class="collapsible-section">
      <div class="section-header" data-target="color-theme"><span>🎨 색상 테마</span><span class="toggle-icon">▼</span></div>
      <div class="section-content" id="color-theme">
        <div class="color-grid">
          <div class="color-item"><label>전체 배경</label><input type="color" id="themeBg" value="#e8e0cc"></div>
          <div class="color-item"><label>상단 대사창 배경</label><input type="color" id="speechBg" value="#1a2240"></div>
          <div class="color-item"><label>상단 대사창 하단 그라데이션</label><input type="color" id="speechBgGrad" value="#151c38"></div>
          <div class="color-item"><label>이름 색상</label><input type="color" id="nameColor" value="#8ab4f8"></div>
          <div class="color-item"><label>대사 글자색</label><input type="color" id="textColor" value="#d8e0f0"></div>
          <div class="color-item"><label>탭 영역 배경</label><input type="color" id="tabBg" value="#d8ceaa"></div>
          <div class="color-item"><label>탭 글자색</label><input type="color" id="tabTextColor" value="#3a2e10"></div>
          <div class="color-item"><label>활성 탭 배경</label><input type="color" id="tabActiveBg" value="#e8e0cc"></div>
          <div class="color-item"><label>활성 탭 글자색</label><input type="color" id="tabActiveTextColor" value="#1a1000"></div>
          <div class="color-item"><label>키워드 목록 배경</label><input type="color" id="panelBg" value="#e8e0cc"></div>
          <div class="color-item"><label>키워드 제목 색상</label><input type="color" id="kwTitleColor" value="#1a2e7a"></div>
          <div class="color-item"><label>키워드 설명 색상</label><input type="color" id="kwDescColor" value="#4a3a10"></div>
          <div class="color-item"><label>버튼 배경 (리셋)</label><input type="color" id="btnResetBg" value="#2a3550"></div>
          <div class="color-item"><label>버튼 글자색</label><input type="color" id="btnTextColor" value="#8ba4cc"></div>
          <div class="color-item"><label>버튼 배경 (대화 끝내기)</label><input type="color" id="btnEndBg" value="#1a4a8a"></div>
          <div class="color-item"><label>구분선/테두리 색상</label><input type="color" id="borderColor" value="#b8aa80"></div>
        </div>
      </div>
    </div>

    <!-- 기본 응답 -->
    <div class="collapsible-section">
      <div class="section-header" data-target="fallback-settings"><span>💬 기본 응답 (대사 없을 때)</span><span class="toggle-icon">▼</span></div>
      <div class="section-content" id="fallback-settings">
        <div class="form-group"><label>JSON 배열</label><textarea id="fallbackMessages" rows="2" style="font-family:monospace;">["다른 이야기를 하자.", "그건 잘 모르겠어.", "음... 그건 좀...", "패스.", "다음 주제로."]</textarea></div>
      </div>
    </div>

    <!-- 분류 목록 -->
    <div class="collapsible-section">
      <div class="section-header" data-target="categories-list">
        <span>📑 분류(탭) 목록</span>
        <div><button id="collapseAllBtn" style="background:#4b5563;">모두 접기</button><button id="expandAllBtn" style="background:#4b5563;">모두 펴기</button><span class="toggle-icon" style="margin-left:0.5rem;">▼</span></div>
      </div>
      <div class="section-content" id="categories-list">
        <div id="categoriesContainer"></div>
        <button id="addCategoryBtn" style="background:#2563eb;">➕ 분류 추가</button>
      </div>
    </div>

    <!-- 기타 설정 -->
    <div class="collapsible-section">
      <div class="section-header" data-target="settings"><span>⚙️ 기타</span><span class="toggle-icon">▼</span></div>
      <div class="section-content" id="settings">
        <div class="form-group"><label>한 페이지 키워드 수</label><input type="number" id="perPage" value="6" min="1" max="30"></div>
      </div>
    </div>
  </div>

  <!-- 우측 패널 -->
  <div class="result-panel">
    <div class="preview-container">
      <div class="flex-between"><span>🖥️ 실시간 미리보기</span><span style="font-size:0.6rem;">(클릭/버튼 동작)</span></div>
      <iframe id="previewIframe" title="Preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
    <div class="code-header">
      <strong>📋 생성된 HTML 코드 (티스토리용)</strong>
      <div><button id="copyCodeBtn" class="copy-btn">📋 복사</button><button id="downloadHtmlBtn" class="download-btn">⬇️ 저장</button></div>
    </div>
    <pre id="generatedCode"></pre>
    <small>💡 코드 복사 → 티스토리 HTML 모드에 붙여넣기</small>
  </div>
</div>

<script>
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
  }

  // 전역 데이터
  let categories = [];
  let categoryCollapsed = {};

  // DOM 요소
  const categoriesContainer = document.getElementById('categoriesContainer');
  const addCategoryBtn = document.getElementById('addCategoryBtn');
  const previewIframe = document.getElementById('previewIframe');
  const generatedCodePre = document.getElementById('generatedCode');
  const copyBtn = document.getElementById('copyCodeBtn');
  const downloadBtn = document.getElementById('downloadHtmlBtn');
  const charNameInput = document.getElementById('charName');
  const portraitDefaultInput = document.getElementById('portraitDefault');
  const portraitMapTextarea = document.getElementById('portraitMap');
  const defaultTextInput = document.getElementById('defaultText');
  const endMessageInput = document.getElementById('endMessage');
  const noKeywordMessageInput = document.getElementById('noKeywordMessage');
  const perPageInput = document.getElementById('perPage');
  const hidePortraitCheckbox = document.getElementById('hidePortrait');
  const collapseAllBtn = document.getElementById('collapseAllBtn');
  const expandAllBtn = document.getElementById('expandAllBtn');
  const fallbackMessagesTextarea = document.getElementById('fallbackMessages');
  const webFontCode = document.getElementById('webFontCode');
  const fontFamilyName = document.getElementById('fontFamilyName');
  const jsonFileInput = document.getElementById('jsonFileInput');
  const htmlFileInput = document.getElementById('htmlFileInput');
  const loadHtmlBtn = document.getElementById('loadHtmlBtn');
  const loadSampleBtn = document.getElementById('loadSampleBtn');
  const pasteHtmlCode = document.getElementById('pasteHtmlCode');
  const loadFromPasteBtn = document.getElementById('loadFromPasteBtn');
  const pasteLoadStatus = document.getElementById('pasteLoadStatus');

  // 색상 요소 가져오기
  const themeColors = {};
  const colorIds = ['themeBg','speechBg','speechBgGrad','nameColor','textColor','tabBg','tabTextColor','tabActiveBg','tabActiveTextColor','panelBg','kwTitleColor','kwDescColor','btnResetBg','btnTextColor','btnEndBg','borderColor'];
  colorIds.forEach(id => { themeColors[id] = document.getElementById(id); });

  // ----------------------------- 분류 접기/펴기 -----------------------------
  function toggleCategoryContent(catDiv, idx) {
    const content = catDiv.querySelector('.cat-content');
    const icon = catDiv.querySelector('.toggle-icon');
    if (content && icon) {
      const isCollapsed = content.classList.contains('collapsed');
      if (isCollapsed) {
        content.classList.remove('collapsed');
        icon.textContent = '▼';
        categoryCollapsed[idx] = false;
      } else {
        content.classList.add('collapsed');
        icon.textContent = '▶';
        categoryCollapsed[idx] = true;
      }
    }
  }

  function collapseAll() {
    for (let i = 0; i < categories.length; i++) categoryCollapsed[i] = true;
    renderCategoriesForm();
    updateAll();
  }

  function expandAll() {
    for (let i = 0; i < categories.length; i++) categoryCollapsed[i] = false;
    renderCategoriesForm();
    updateAll();
  }

  function initCollapsibleSections() {
    document.querySelectorAll('.section-header').forEach(header => {
      const targetId = header.getAttribute('data-target');
      const content = document.getElementById(targetId);
      const icon = header.querySelector('.toggle-icon');
      if (content && icon) {
        content.classList.remove('collapsed');
        icon.textContent = '▼';
        header.addEventListener('click', (e) => {
          if (e.target.tagName === 'BUTTON') return;
          content.classList.toggle('collapsed');
          icon.textContent = content.classList.contains('collapsed') ? '▶' : '▼';
        });
      }
    });
  }

  // ----------------------------- 카테고리 편집기 렌더링 -----------------------------
  function renderCategoriesForm() {
    categoriesContainer.innerHTML = '';
    categories.forEach((cat, idx) => {
      const isCollapsed = categoryCollapsed[idx] === true;
      const catDiv = document.createElement('div');
      catDiv.className = 'cat-item';
      catDiv.innerHTML = `
        <div class="cat-header">
          <strong>📁 ${escapeHtml(cat.name)}</strong>
          <div><button class="deleteCatBtn" data-idx="${idx}" style="background:#b91c1c; padding:0.2rem 0.6rem; margin-right:0.3rem;">삭제</button><span class="toggle-icon" style="cursor:pointer;">${isCollapsed ? '▶' : '▼'}</span></div>
        </div>
        <div class="cat-content ${isCollapsed ? 'collapsed' : ''}">
          <div class="form-group"><label>분류 이름</label><input type="text" class="cat-name" value="${escapeHtml(cat.name)}" data-idx="${idx}"></div>
          <div style="margin:0.5rem 0 0.3rem; font-weight:600;">🔑 키워드 목록</div>
          <div class="keywords-container" data-idx="${idx}">
            ${cat.keywords.map((kw, kwIdx) => `
              <div class="kw-item" data-kwidx="${kwIdx}">
                <div class="flex-between"><span class="badge">키워드 ${kwIdx+1}</span><button class="deleteKwBtn" data-catidx="${idx}" data-kwidx="${kwIdx}" style="background:#b91c1c; padding:0.1rem 0.5rem;">✖</button></div>
                <div class="form-group"><label>키워드 이름</label><input type="text" class="kw-name" value="${escapeHtml(kw.kw)}" data-catidx="${idx}" data-kwidx="${kwIdx}"></div>
                <div class="form-group"><label>설명</label><input type="text" class="kw-desc" value="${escapeHtml(kw.desc)}" data-catidx="${idx}" data-kwidx="${kwIdx}"></div>
                <div class="form-group"><label>대사 배열 (시퀀스 JSON)</label><textarea class="kw-lines" rows="3" data-catidx="${idx}" data-kwidx="${kwIdx}" style="font-family:monospace;">${escapeHtml(kw.lines)}</textarea></div>
                <div class="form-group"><label>표정 배열 (시퀀스 JSON)</label><textarea class="kw-faces" rows="3" data-catidx="${idx}" data-kwidx="${kwIdx}" style="font-family:monospace;">${escapeHtml(kw.faces)}</textarea></div>
              </div>
            `).join('')}
          </div>
          <button class="addKeywordBtn" data-catidx="${idx}" style="background:#334155; margin-top:0.3rem;">+ 키워드 추가</button>
        </div>
      `;
      categoriesContainer.appendChild(catDiv);
      const headerDiv = catDiv.querySelector('.cat-header');
      const iconSpan = catDiv.querySelector('.toggle-icon');
      if (headerDiv && iconSpan) {
        headerDiv.addEventListener('click', (e) => {
          if (e.target.tagName === 'BUTTON') return;
          toggleCategoryContent(catDiv, idx);
        });
      }
    });
    attachCategoryEvents();
  }

  function attachCategoryEvents() {
    // 삭제 분류
    document.querySelectorAll('.deleteCatBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        categories.splice(idx, 1);
        const newCollapsed = {};
        for (let i = 0; i < categories.length; i++) {
          if (i < idx) newCollapsed[i] = categoryCollapsed[i];
          else newCollapsed[i] = categoryCollapsed[i+1];
        }
        categoryCollapsed = newCollapsed;
        renderCategoriesForm();
        updateAll();
      });
    });
    // 분류 이름 수정
    document.querySelectorAll('.cat-name').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const idx = parseInt(inp.dataset.idx);
        categories[idx].name = inp.value;
        updateAll();
      });
    });
    // 키워드 추가

  // ----------------------------- 강화된 HTML 데이터 추출 -----------------------------
  function extractCategoriesFromHTML(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    // 1. 우선 kw-categories-data 태그 확인
    let scriptElem = doc.getElementById('kw-categories-data');
    if (scriptElem && scriptElem.textContent) {
      try {
        return JSON.parse(scriptElem.textContent);
      } catch(e) { /* 다음 방법으로 */ }
    }
    // 2. <script> 내에서 const stories = [...] 패턴 찾기
    const scripts = doc.querySelectorAll('script:not([src])');
    for (let script of scripts) {
      const text = script.textContent;
      const match = text.match(/const\s+stories\s*=\s*(\[[\s\S]*?\]);/);
      if (match && match[1]) {
        try {
          const possibleData = eval('(' + match[1] + ')');
          if (Array.isArray(possibleData) && possibleData.length > 0 && possibleData[0].hasOwnProperty('title') && possibleData[0].hasOwnProperty('lines')) {
            // 이전 위젯의 stories 배열을 categories 형식으로 변환
            const converted = possibleData.map(story => ({
              name: story.title,
              keywords: story.lines.map(line => ({
                kw: line.name || '알 수 없음',
                desc: '',
                lines: JSON.stringify([line.text]),
                faces: JSON.stringify(['기본'])
              }))
            }));
            return converted;
          }
          return possibleData;
        } catch(e) {}
      }
    }
    return null;
  }

  function loadFromHTMLFile(file) {

      try {
        const data = extractCategoriesFromHTML(html);
        if (data && Array.isArray(data)) {
          categories = data;
          categoryCollapsed = {};
          renderCategoriesForm();
          updateAll();
          alert(`✅ HTML 파일에서 ${categories.length}개의 분류를 불러왔습니다.`);
        } else {
          alert('이 HTML 파일에서 카테고리 데이터를 찾을 수 없습니다.\n(이 생성기로 만든 최신 위젯이 아니거나, stories 변수 추출에 실패했습니다.)');
        }
      } catch(e) { alert('파싱 오류: ' + e.message); }
    };
    reader.readAsText(file);
  }

${categoriesJson}
<\/script>
<script>
  (function(){
    var widget = document.getElementById('wk-kd-widget');
    if(!widget) return;
    var nameEl = document.getElementById('wk-kd-name'), textEl = document.getElementById('wk-kd-text'), portWrap = document.getElementById('wk-kd-portrait-wrap'), endBtn = document.getElementById('wk-kd-end'), resetBtn = document.getElementById('wk-kd-reset');
    if(nameEl) nameEl.textContent = widget.getAttribute('data-name') || '캐릭터 이름';
    var defaultTxt = widget.getAttribute('data-default') || (textEl ? textEl.textContent.trim() : '');
    var endMessage = widget.getAttribute('data-end-message') || '대화를 끝냈습니다.';
    var noKeywordMessage = widget.getAttribute('data-no-keyword-message') || '키워드를 먼저 선택해주세요.';
    if(textEl) textEl.textContent = defaultTxt;
    var portraitMap = {};
    try { portraitMap = JSON.parse(widget.getAttribute('data-portraits') || '{}'); } catch(e) {}
    var fallbackMessages = [];
    try { fallbackMessages = JSON.parse(widget.getAttribute('data-fallback') || '["다른 이야기를 하자.","그건 잘 모르겠어."]'); } catch(e) { fallbackMessages = ["다른 이야기를 하자.","그건 잘 모르겠어."]; }
    var portraitImg = null;
    function setPortrait(key){
      if(!portWrap) return;
      var url = (key && portraitMap[key]) ? portraitMap[key] : (portraitMap['기본'] || '');
      if(!url){
        if(portWrap.children.length===0 || !portWrap.querySelector('img')) portWrap.innerHTML = '<div class="wk-kd-portrait-ph">초상화<br>영역</div>';
        return;
      }
      if(!portraitImg){
        portWrap.innerHTML = '<img alt="초상화" style="display:block;width:100%;height:100%;object-fit:cover;margin:0;padding:0;border:none;">';
        portraitImg = portWrap.querySelector('img');
      }
      portraitImg.src = url;
    }
    setPortrait('기본');
    
    var sequences = [];
    var activeSeqIdx = -1;
    var currentLineIdx = -1;
    
    function parseSequences(linesRaw, facesRaw) {
      var seqs = [];
      try {
        var linesArr = JSON.parse(linesRaw);
        var facesArr = JSON.parse(facesRaw);
        if (!Array.isArray(linesArr)) linesArr = [linesArr];
        if (!Array.isArray(facesArr)) facesArr = [facesArr];
        for (var i = 0; i < linesArr.length; i++) {
          var seqLines = Array.isArray(linesArr[i]) ? linesArr[i] : [linesArr[i]];
          var seqFaces = (facesArr[i] && Array.isArray(facesArr[i])) ? facesArr[i] : (facesArr[i] ? [facesArr[i]] : []);
          while (seqFaces.length < seqLines.length) seqFaces.push('기본');
          seqs.push({ lines: seqLines, faces: seqFaces });
        }
      } catch(e) {
        seqs = [{ lines: ["대사 오류"], faces: ["기본"] }];
      }
      return seqs;
    }
    
    function showCurrentLine() {
      if (activeSeqIdx < 0 || currentLineIdx < 0) return;
      var seq = sequences[activeSeqIdx];
      if (!seq || currentLineIdx >= seq.lines.length) return;
      if (textEl) textEl.textContent = seq.lines[currentLineIdx];
      var faceKey = seq.faces[currentLineIdx];
      if (faceKey && faceKey !== '') setPortrait(faceKey);
      else setPortrait('기본');
      if (endBtn) {
        if (currentLineIdx < seq.lines.length - 1) endBtn.textContent = '다음';
        else endBtn.textContent = '대화 끝내기';
      }
    }
    
    function nextOrEnd() {
      if (activeSeqIdx < 0 || currentLineIdx < 0) {
        if (textEl) textEl.textContent = noKeywordMessage;
        setPortrait('기본');
        return;
      }
      var seq = sequences[activeSeqIdx];
      if (currentLineIdx < seq.lines.length - 1) {
        currentLineIdx++;
        showCurrentLine();
      } else {
        if (textEl) textEl.textContent = endMessage;
        setPortrait('기본');
        sequences = [];
        activeSeqIdx = -1;
        currentLineIdx = -1;
        if (endBtn) endBtn.textContent = '대화 끝내기';
      }
    }
    
    function resetDialogue() {
      sequences = [];
      activeSeqIdx = -1;
      currentLineIdx = -1;
      if (textEl) textEl.textContent = defaultTxt;
      setPortrait('기본');
      if (endBtn) endBtn.textContent = '대화 끝내기';
    }
    
    function startDialog(item) {
      var rawLines = item.getAttribute('data-lines') || '[["..."]]';
      var rawFaces = item.getAttribute('data-faces') || '[["기본"]]';
      var parsedSeqs = parseSequences(rawLines, rawFaces);
      if (parsedSeqs.length === 0) return;
      sequences = parsedSeqs;
      activeSeqIdx = Math.floor(Math.random() * sequences.length);
      currentLineIdx = 0;
      showCurrentLine();
    }
    
    widget.addEventListener('click', function(e){ var item = e.target.closest ? e.target.closest('.wk-kd-item') : null; if(item) startDialog(item); });
    if(endBtn) endBtn.addEventListener('click', nextOrEnd);
    if(resetBtn) resetBtn.addEventListener('click', function(){
      resetDialogue();
      var activeTab = document.querySelector('.wk-kd-tab.active');
      if(activeTab) switchTab(activeTab.getAttribute('data-cat'));
    });
    
    var tabs = widget.querySelectorAll('.wk-kd-tab');
    var panels = widget.querySelectorAll('.wk-kd-panel');
    var curCat = null, curPage = 1, PER_PAGE = ${perPage};
    function showPage(catId, page){
      var panel = document.getElementById(catId);
      if(!panel) return;
      var items = panel.querySelectorAll('.wk-kd-item');
      var total = Math.max(1, Math.ceil(items.length / PER_PAGE));
      page = Math.max(1, Math.min(page, total));
      curPage = page;
      var start = (page-1)*PER_PAGE, end = page*PER_PAGE;
      items.forEach(function(item,i){ item.style.display = (i>=start && i<end) ? '' : 'none'; });
      var pageInfo = document.getElementById('wk-kd-pageinfo');
      var prevBtn = document.getElementById('wk-kd-prev'), nextBtn = document.getElementById('wk-kd-next');
      if(pageInfo) pageInfo.textContent = page + ' / ' + total;
      if(prevBtn) prevBtn.disabled = (page<=1);
      if(nextBtn) nextBtn.disabled = (page>=total);
    }
    function switchTab(catId){
      if(!catId) return;
      curCat = catId;
      curPage = 1;
      tabs.forEach(function(tab){ tab.classList.toggle('active', tab.getAttribute('data-cat')===catId); });
      panels.forEach(function(panel){ panel.classList.toggle('active', panel.id===catId); });
      showPage(catId,1);
    }
    tabs.forEach(function(tab){ tab.addEventListener('click', function(){ switchTab(tab.getAttribute('data-cat')); }); });
    var prevBtn = document.getElementById('wk-kd-prev'), nextBtn = document.getElementById('wk-kd-next');
    if(prevBtn) prevBtn.addEventListener('click', function(){ if(curCat) showPage(curCat, curPage-1); });
    if(nextBtn) nextBtn.addEventListener('click', function(){ if(curCat) showPage(curCat, curPage+1); });
    if(tabs.length>0) switchTab(tabs[0].getAttribute('data-cat'));
    resetDialogue();
  })();
<\/script>
</body>
</html>`;
